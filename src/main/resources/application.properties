# ===============================
# Database
# ===============================
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:3306/PinkFlowTest?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:create-drop}

# ===============================
# Dev helpers
# ===============================
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# Error responses
# ===============================
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=never

# ===============================
# Mail
# ===============================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# ===============================
# Custom mail props
# ===============================
app.mail.from=${MAIL_FROM:${MAIL_USERNAME:}}
app.mail.from-name=Tourism Hotel Booking

# ===============================
# Pricing
# ===============================
pricing.weekend.days=FRIDAY,SATURDAY
pricing.weekend.multiplier=1.25
pricing.tax.rate=0.16

# ===============================
# File upload
# ===============================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

app.upload.dir=uploads/hotels
app.base-url=http://localhost:8080

# ===============================
# JWT
# ===============================
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=86400000

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
spring.profiles.active=dev

springdoc.swagger-ui.try-it-out-enabled=true
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha

management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always


management.endpoint.health.probes.enabled=true
server.port=8080
server.address=0.0.0.0
